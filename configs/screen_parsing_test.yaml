seed: 42

data:
  image_dir: D:/TV_data/TV_data
  output_dir: D:/TV_data/teacher_parsing
  manifest_path: D:/TV_data/teacher_parsing/screen_parsing_manifest.jsonl
  distill_path: D:/TV_data/teacher_parsing/screen_parsing_teacher_labels.jsonl
  eval_path: D:/TV_data/teacher_parsing/screen_parsing_teacher_labels.jsonl
  image_root: .
  max_samples: null

teacher:
  backend: hf
  model_name: D:/Models/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: 8bit
  temperature: 0.0
  max_new_tokens: 128
  image_resize: original

student:
  model_name: mock-vlm-student
  output_dir: outputs/screen_parsing_student
  adapter_dir: outputs/screen_parsing_student/adapter
  use_lora: true
  quantization: none

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 4
  log_every: 1
  save_every: 50
  mixed_precision: "no"

distillation:
  target_field: student_target
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify only visible interactive UI elements in this screenshot.

    Interactive elements include:
    - tabs
    - buttons
    - app icons
    - menu items
    - tiles
    - toggles
    - search or text inputs
    - clickable text links

    Exclude:
    - movie descriptions
    - recommendation summaries
    - long informational text
    - advertisements
    - decorative or non-interactive text

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    Use this schema:
    {{
      "elements": [
        ""
      ]
    }}

evaluation:
  output_path: outputs/screen_parsing_eval_report.json
  metrics:
    - valid_json_rate
    - element_f1
