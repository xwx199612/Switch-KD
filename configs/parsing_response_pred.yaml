data:
  manifest_path: D:/TV_data/teacher_parsing/parsing_manifest.jsonl
  distill_path: outputs/response-kd/parsing_merged_predictions_480p_8bit.jsonl
  label_path: D:/TV_data/teacher_parsing/parsing_teacher_labels_480p_8bit.jsonl
  prediction_path: outputs/response-kd/parsing_merged_predictions_480p_8bit.jsonl
  eval_path: D:/TV_data/teacher_parsing/parsing_teacher_labels_480p_8bit.jsonl
  image_root: .

teacher:
  backend: hf
  model_name: C:/Users/GT13-1365xt/.cache/huggingface/hub/models--Qwen--Qwen2.5-VL-7B-Instruct/snapshots/cc594898137f460bfe9f0759e9844b3ce807cfb5
  max_new_tokens: 128
  image_resize: 480p

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  inference_model_path: outputs/student/merged_response_KD_480p_8bit
  output_dir: outputs/parsing_response_480p_8bit_student_4bit
  adapter_dir: outputs/parsing_response_480p_8bit_student_4bit/adapter
  quantization: none

training:
  image_resize: 480p

distillation:
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify only visible interactive UI elements in this screenshot.

    Interactive elements include:
    - tabs
    - buttons
    - app icons
    - menu items
    - tiles
    - toggles
    - search or text inputs
    - clickable text links

    Exclude:
    - movie descriptions
    - recommendation summaries
    - long informational text
    - advertisements
    - decorative or non-interactive text

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    Use this schema:
    {{
      "elements": [
        ""
      ]
    }}
evaluation:
  output_path: outputs/parsing_merged_eval_report_480p_8bit.json
