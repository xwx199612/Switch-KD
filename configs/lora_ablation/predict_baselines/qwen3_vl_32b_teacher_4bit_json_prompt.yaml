seed: 42
options:
  task_name: parsing
  quality: 1080p
  teacher_quantization: 4bit
  student_quantization: 4bit
data:
  training_manifest_path: outputs/lora_ablation/parsing_inference_manifest.jsonl
  inference_manifest_path: outputs/lora_ablation/parsing_inference_manifest.jsonl
  distill_path: outputs/baselines/qwen3_vl_32b_teacher_4bit_json_prompt_1280/distill.jsonl
  label_path: outputs/switch-kd/{task_name}_teacher_labels_{label_profile}.jsonl
  switch_logits_path: outputs/switch-kd/{task_name}_switch_logits_{response_profile}.jsonl
  eval_path: null
  prediction_path: outputs/baselines/qwen3_vl_32b_teacher_4bit_json_prompt_1280/teacher_predictions.jsonl
  training_image_dir: /mnt/nvme0/vlm_distill/TV_data
  inference_image_dir: /mnt/nvme0/vlm_distill/validation_data
  image_root: .
  max_samples: null
teacher:
  backend: hf
  model_name: /mnt/nvme0/vlm_distill/models/Qwen3-VL-32B-Instruct
  device_map: auto
  torch_dtype: bfloat16
  quantization: 4bit
  attn_implementation: sdpa
  temperature: 0.0
  max_new_tokens: 1280
  image_resize: 1080p
student:
  model_name: /mnt/nvme0/vlm_distill/models/Qwen3-VL-32B-Instruct
  output_dir: outputs/baselines/qwen3_vl_32b_teacher_4bit_json_prompt_1280
  adapter_dir: outputs/baselines/qwen3_vl_32b_teacher_4bit_json_prompt_1280/adapter
  merged_model_path: null
  inference_model_path: null
  inference_adapter_path: null
  load_adapter: false
  merge_adapter: false
  device_map: auto
  use_lora: false
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  quantization: 4bit
  attn_implementation: sdpa
training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps: null
  log_every: 50
  save_every: 1000
  mixed_precision: bf16
  gradient_checkpointing: true
  image_resize: 1080p
  max_length: 4096
  freeze_vision_tower: true
  mask_prompt_labels: true
distillation:
  method: sft
  teacher_logits: false
  confidence_weighting: true
  min_teacher_confidence: 0.35
  prompt_template: |
    You are labeling Android TV screenshots for UI grounding.

    Task:
    {query}

    Find all visible interactive UI elements.

    Return valid JSON only.
    Use ASCII double quotes only: "
    Do not use smart quotes: “ ”
    Do not use markdown.
    Do not explain.

    Use this exact schema:
    {{
      "elements": [
        {{
          "text": "visible UI element name",
          "bbox_norm": [80, 120, 140, 180],
          "focused": false
        }}
      ],
      "coordinate_system": "normalized_0_1000"
    }}

    Rules:
    - Every element must use exactly these keys: "text", "bbox_norm", "focused".
    - Do not include type.
    - Do not use alternative bbox key names: bbox, box_norm, bx_norm, bbox norm, bboxNorm, boxed_norm.
    - bbox_norm must be an array of exactly four integers, e.g. [80, 120, 140, 180].
    - Do not write bbox_norm as comma-separated text.
    - Use normalized 0-1000 coordinates, not pixel coordinates.
    - text must be the visible UI label or a short visual name of the element.
    - Do not use schema words such as text, button, tab, app_icon, menu_item, icon, bbox_norm, coordinate_system, or elements as text unless that exact word is visibly displayed on screen.
    - focused must be exactly true or false.
    - If focused is not visually clear, use false.
    - Include "coordinate_system": "normalized_0_1000".
    - Prioritize valid JSON over recall.
    - If unsure about an element bbox, omit that element.
    - Keep text short. If visible text is very long, summarize it into a short label.

    Important:
    Because Python .format() is used on prompt_template:
    - Keep placeholders as single braces: {query}, {question}, {task}
    - Escape literal JSON braces as double braces: {{ and }}
    - Do not use unescaped JSON braces in YAML.
  lm_loss_weight: 1.0
  dbild_loss_weight: 0.0
  vsd_loss_weight: 0.0
  kd_temperature: 2.0
  dbild_top_k: 64
  dbild_top_k_mode: kneedle
  dbild_kneedle_candidate_k: 256
  dbild_min_top_k: 4
  dbild_max_top_k: 128
  dbild_kl_mode: reverse
  dbild_min_prob: 0.0
  teacher_logits_field: teacher_logits
  switch_logits_field: switch_logits
  use_cached_logits: true
  student_vision_path: model.visual
  teacher_lm_path: model.language_model
  teacher_token_embedding_path: model.language_model.embed_tokens
  teacher_lm_head_path: lm_head
  switch_cache_student_visual: true
  student_visual_cache_dir: outputs/switch-kd/{task_name}_student_visual_cache_{response_profile}
  keep_student_visual_cache_on_cpu: true
  visual_token_placeholder: <|image_pad|>
  max_cached_logits_vocab: 4096
  align_kd_logits_to_answer: true
  skip_kd_on_vocab_mismatch: false
  switch_kd:
    enabled: true
    visual_switch:
      mode: paper
      teacher_projector: native
      allow_fallback_adapter: false
evaluation:
  output_path: outputs/baselines/qwen3_vl_32b_teacher_4bit_json_prompt_1280/evaluation.json
  metrics:
  - exact_match
  - token_f1
