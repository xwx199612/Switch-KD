seed: 42

options:
  task_name: parsing
  quality: 480p
  teacher_quantization: 8bit
  student_quantization: 4bit
  # Derived automatically:
  # label_profile = {quality}_{teacher_quantization}
  # response_profile = {quality}_{teacher_quantization}_student_{student_quantization}

data:
  image_dir: D:/TV_data/TV_data
  output_dir: D:/TV_data/teacher_parsing
  manifest_path: D:/TV_data/teacher_parsing/{task_name}_manifest.jsonl
  distill_path: D:/TV_data/teacher_parsing/{task_name}_teacher_labels_{label_profile}.jsonl
  eval_path: D:/TV_data/teacher_parsing/{task_name}_teacher_labels_{label_profile}.jsonl
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: D:/Models/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: float16
  quantization: "{teacher_quantization}"
  temperature: 0.0
  max_new_tokens: 128
  image_resize: "{quality}"

student:
  model_name: mock-vlm-student
  output_dir: outputs/{task_name}_labeling_{label_profile}
  adapter_dir: outputs/{task_name}_labeling_{label_profile}/adapter
  use_lora: true
  quantization: none

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 4
  log_every: 1
  save_every: 50
  mixed_precision: "no"
  image_resize: "{quality}"

distillation:
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify only visible interactive UI elements in this screenshot.

    Interactive elements include:
    - tabs
    - buttons
    - app icons
    - menu items
    - tiles
    - toggles
    - search or text inputs
    - clickable text links

    Exclude:
    - movie descriptions
    - recommendation summaries
    - long informational text
    - advertisements
    - decorative or non-interactive text

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    Use this schema:
    {{
      "elements": [
        ""
      ]
    }}

evaluation:
  output_path: outputs/{task_name}_labeling_{label_profile}/eval_report.json
  metrics:
    - valid_json_rate
    - element_f1
