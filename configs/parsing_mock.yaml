seed: 42

data:
  manifest_path: examples/parsing_manifest.jsonl
  distill_path: outputs/parsing_distill_dataset.jsonl
  eval_path: outputs/parsing_distill_dataset.jsonl
  image_root: .
  max_samples: 16

teacher:
  backend: mock
  model_name: mock-vlm-teacher
  temperature: 0.2
  max_new_tokens: 256
  image_resize: original

student:
  model_name: mock-vlm-student
  output_dir: outputs/parsing_student
  adapter_dir: outputs/parsing_student/adapter
  use_lora: true
  quantization: none

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_steps: 4
  log_every: 1
  save_every: 50
  mixed_precision: "no"
  image_resize: original

distillation:
  prompt_template: |
    You are a GUI screen parsing assistant.

    Analyze this device screenshot and list only visible interactive UI elements.

    query: {query}

    Return only valid JSON:
    {{
      "elements": [
        ""
      ]
    }}

evaluation:
  output_path: outputs/parsing_eval_report.json
  metrics:
    - valid_json_rate
    - element_f1

