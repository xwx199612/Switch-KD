seed: 42

options:
  task_name: parsing
  quality: 480p
  teacher_quantization: 8bit
  student_quantization: 4bit
  # Derived automatically:
  # label_profile = {quality}_{teacher_quantization}
  # response_profile = {quality}_{teacher_quantization}_student_{student_quantization}

data:
  manifest_path: D:/TV_data/teacher_parsing/{task_name}_manifest.jsonl
  distill_path: D:/TV_data/teacher_parsing/{task_name}_teacher_labels_{label_profile}.jsonl
  eval_path: D:/TV_data/teacher_parsing/{task_name}_teacher_labels_{label_profile}.jsonl
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device_map: auto
  torch_dtype: bfloat16
  temperature: 0.0
  max_new_tokens: 128
  image_resize: "{quality}"

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/{task_name}_response_{response_profile}
  adapter_dir: outputs/{task_name}_response_{response_profile}/adapter
  use_lora: true
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  quantization: "{student_quantization}"

training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_ratio: 0.03
  max_steps:
  log_every: 10
  save_every: 500
  mixed_precision: bf16
  gradient_checkpointing: true
  image_resize: "{quality}"
  max_length: 3072
  freeze_vision_tower: true
  mask_prompt_labels: true

distillation:
  method: response
  confidence_weighting: true
  min_teacher_confidence: 0.35
  prompt_template: "query: {query}\nAnswer:"

evaluation:
  output_path: outputs/{task_name}_response_{response_profile}/eval_report.json
  metrics:
    - exact_match
    - token_f1
