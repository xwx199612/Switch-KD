data:
  image_dir: D:/TV_data/valid_data
  manifest_path: outputs/evaluate_base3b/parsing_manifest.jsonl
  distill_path: outputs/evaluate_base3b/parsing_teacher_labels_480p_8bit.jsonl
  label_path: outputs/evaluate_base3b/parsing_teacher_labels_480p_8bit.jsonl
  prediction_path: outputs/evaluate_base3b/parsing_base3b_predictions_480p_8bit.jsonl
  eval_path: outputs/evaluate_base3b/parsing_teacher_labels_480p_8bit.jsonl
  image_root: .
  max_samples:

teacher:
  backend: hf
  model_name: C:/Users/GT13-1365xt/.cache/huggingface/hub/models--Qwen--Qwen2.5-VL-7B-Instruct/snapshots/cc594898137f460bfe9f0759e9844b3ce807cfb5
  device_map: auto
  torch_dtype: bfloat16
  quantization: 8bit
  temperature: 0.0
  max_new_tokens: 128
  image_resize: 480p

student:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  inference_model_path: C:/Users/GT13-1365xt/.cache/huggingface/hub/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
  output_dir: outputs/parsing_response_480p_8bit_student_4bit
  adapter_dir: outputs/parsing_response_480p_8bit_student_4bit/adapter
  quantization: none

training:
  image_resize: 480p

distillation:
  prompt_template: |
    You are an Android TV GUI parsing assistant.

    Task:
    {query}

    Identify only visible interactive UI elements in this screenshot.

    Interactive elements include:
    - tabs
    - buttons
    - app icons
    - menu items
    - tiles
    - toggles
    - search or text inputs
    - clickable text links

    Exclude:
    - movie descriptions
    - recommendation summaries
    - long informational text
    - advertisements
    - decorative or non-interactive text

    Return raw JSON only.
    Do not explain.
    Do not use markdown.

    Use this schema:
    {{
      "elements": [
        ""
      ]
    }}

evaluation:
  output_path: outputs/evaluate_base3b/parsing_teacher_vs_base3b_eval_report.json

workflow:
  offline: true
  recursive: false
  query: List all visible interactive UI elements on this screen.
  teacher_name: teacher_480p_8bit
  student_name: base3b_480p
  comparison_output_path: outputs/evaluate_base3b/parsing_teacher_vs_base3b_unique_480p_8bit.jsonl
  drop_empty: false
